aid: cornershop
name: Cornershop by Uber
description: >-
  Cornershop is an on-demand grocery and essentials delivery service founded
  in 2015 in Chile by Oskar Hjertonsson, Daniel Undurraga, and Juan Pablo
  Cuevas, simultaneously launching in Santiago, Chile and Mexico City,
  Mexico. The platform connects consumers with personal shoppers who pick
  and deliver groceries, pharmacy items, and other goods from local
  supermarkets, specialty stores, and big-box retailers. After a 2018
  acquisition attempt by Walmart was blocked by Mexican regulators, Uber
  agreed in October 2019 to acquire majority ownership, completing full
  acquisition in July 2021 at a reported valuation north of US$3 billion
  — Chile's first unicorn exit. At its peak Cornershop operated in eight
  countries across the Americas: Chile, Mexico, Brazil, Colombia, Costa
  Rica, Peru, Canada, and the United States. Beginning in 2021 Uber merged
  the Cornershop brand into Uber Eats, migrating the grocery vertical
  ("Uber Eats Grocery") into its main consumer app and progressively
  shutting down the standalone Cornershop apps and websites. As of 2026
  cornershopapp.com and cornershop.io redirect to ubereats.com, the
  Cornershop LLC GitHub organization (archived October 2024) has zero
  public repositories, and there is no public developer API, SDK, partner
  program, or technical documentation under the Cornershop brand —
  Cornershop survives only as engineering history and as the LatAm
  backbone of Uber Eats Grocery. Community-built unofficial Python
  wrappers exist on GitHub but reverse-engineer the consumer mobile app
  and are not sanctioned by Uber.
